services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: map_demo
      POSTGRES_USER: map_demo
      POSTGRES_PASSWORD: map_demo

  backend:
    build: ./backend
    ports:
      - "3001:5000"
    volumes:
      - ./backend:/app
    environment:
      - CENTRIFUGO_API_URL=http://host.docker.internal:8000/api
      - CENTRIFUGO_API_KEY=map-demo-api-key
      - DATABASE_URL=postgres://map_demo:map_demo@postgres:5432/map_demo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
