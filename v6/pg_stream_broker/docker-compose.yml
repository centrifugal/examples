services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test

  backend:
    build: ./backend
    ports:
      - "3002:5000"
    volumes:
      - ./backend:/app
    environment:
      - CENTRIFUGO_API_URL=http://host.docker.internal:8000/api
      - DATABASE_URL=postgres://test:test@postgres:5432/test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload

  nginx:
    image: nginx:latest
    ports:
      - "9001:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
