services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 2s
      timeout: 3s
      retries: 30

  centrifugo:
    image: centrifugo/centrifugo:v6.8.0
    command: centrifugo -c /centrifugo/centrifugo.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/centrifugo.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "3002:5000"
    volumes:
      - ./backend:/app
    environment:
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - DATABASE_URL=postgres://test:test@postgres:5432/test
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_started
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload

  nginx:
    image: nginx:latest
    ports:
      - "9001:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - centrifugo
