# Docker's embedded DNS so resolution happens at request time and we don't
# fail at boot if a service alias hasn't fully propagated yet.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /connection/ {
        # Variable in proxy_pass forces per-request DNS resolution.
        set $centrifugo_upstream centrifugo:8000;
        proxy_pass http://$centrifugo_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /config {
        set $backend_upstream backend:3001;
        proxy_pass http://$backend_upstream/config;
    }
}
