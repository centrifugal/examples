services:
  centrifugo:
    image: centrifugo/centrifugo:v6.8.0
    command: centrifugo -c /centrifugo/centrifugo.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/centrifugo.json:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - CENTRIFUGO_API_KEY=particles-demo-api-key
      - HMAC_SECRET=particles-demo-hmac-secret
      # MODE selects the transport architecture:
      #   fanout      — single shared-bitmap channel, every viewer gets all bytes (default)
      #   shared_poll — 256-tile grid, viewers track only their viewport, full-res with pan
      - MODE=${MODE:-fanout}
      - PUBLISH_EVERY_N_TICKS=${PUBLISH_EVERY_N_TICKS:-2}
      - DOWNSAMPLE=${DOWNSAMPLE:-1}
      # Optional tuning.
      # - PARTICLE_COUNT=2000000
      # - WORLD_WIDTH=2200
      # - WORLD_HEIGHT=2200

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - centrifugo
