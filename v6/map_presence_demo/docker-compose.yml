services:
  backend:
    build: ./backend
    environment:
      - CENTRIFUGO_API_URL=http://host.docker.internal:8000/api
      - CENTRIFUGO_API_KEY=presence-demo-api-key
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
