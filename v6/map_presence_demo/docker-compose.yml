services:
  centrifugo:
    image: centrifugo/centrifugo:v6.8.0
    command: centrifugo -c /centrifugo/centrifugo.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/centrifugo.json:ro

  backend:
    build: ./backend
    environment:
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - CENTRIFUGO_API_KEY=presence-demo-api-key
    depends_on:
      - centrifugo

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - centrifugo
