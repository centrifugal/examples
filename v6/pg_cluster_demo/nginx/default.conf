resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;

    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Cluster info — proxied to node-1 with API key injected.
    # /api/info returns the list of cluster members tracked via the PG controller.
    location = /api/info {
        set $centrifugo1_upstream centrifugo-1:8000;
        proxy_pass http://$centrifugo1_upstream/api/info;
        proxy_set_header Host $host;
        proxy_set_header X-API-Key "pg-cluster-demo-api-key";
        proxy_set_header Content-Type "application/json";
    }

    # Per-node connection endpoints. Each browser tab picks one explicitly via
    # the ?n=1|2|3 query param so the user can see how a publish from a client
    # on node X reaches subscribers on nodes Y and Z via the PG stream broker,
    # and how presence is shared across nodes via the PG map broker.
    location /connection/n1/ {
        set $centrifugo1_upstream centrifugo-1:8000;
        rewrite ^/connection/n1/(.*)$ /connection/$1 break;
        proxy_pass http://$centrifugo1_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /connection/n2/ {
        set $centrifugo2_upstream centrifugo-2:8000;
        rewrite ^/connection/n2/(.*)$ /connection/$1 break;
        proxy_pass http://$centrifugo2_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /connection/n3/ {
        set $centrifugo3_upstream centrifugo-3:8000;
        rewrite ^/connection/n3/(.*)$ /connection/$1 break;
        proxy_pass http://$centrifugo3_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
