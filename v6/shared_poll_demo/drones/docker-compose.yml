services:
  centrifugo:
    image: centrifugo/centrifugo:v6.8.0
    command: centrifugo -c /centrifugo/centrifugo.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/centrifugo.json:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      CENTRIFUGO_URL: http://centrifugo:8000

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - centrifugo
