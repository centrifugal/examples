services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  centrifugo:
    image: centrifugo/centrifugo:v6.8.1
    command: centrifugo -c /centrifugo/centrifugo.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/centrifugo.json:ro
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - centrifugo
